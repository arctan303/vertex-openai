version: '3.8'

services:
  proxy:
    build: .
    container_name: vertex-openai
    ports:
      - "3000:3000"
    volumes:
      - proxy-data:/app/data
    environment:
      - VERTEX_API_KEY=${VERTEX_API_KEY:-}
      - ADMIN_KEY=${ADMIN_KEY:-}
      - API_KEY=${API_KEY:-}
      - PORT=3000
    restart: unless-stopped

volumes:
  proxy-data:
